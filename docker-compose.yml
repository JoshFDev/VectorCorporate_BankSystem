services:
  db:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://db:27017/vectorbank
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - NODE_ENV=production
      - CORS_ORIGINS=http://localhost:4200
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ./appBankSystem
      dockerfile: Dockerfile
    ports:
      - '4200:4200'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
